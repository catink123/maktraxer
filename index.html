<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />

    <title>дока 3</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="slots.css">
    <script src="libs/howler.min.js"></script>
    <script src="script.js" defer></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Geologica:wght,CRSV@100..900,0&family=Lora:ital,wght@0,400..700;1,400..700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="container" id="q1" style="display: none;">
        <h1>Любишь сеню?</h1>
        <button onclick="goto(q2)">Дат</button>
        <button onclick="goto(q1no)">Нит</button>
    </div>
    <div class="container" id="q1no" style="display: none;">
        <img src="q1no.jpg">
        <button onclick="goto(q1)">Ще раз</button>
    </div>

    <div class="container" id="q2" style="display: none;">
        <h1>Согласен?</h1>
        <button onclick="goto(q3)">Да</button>
        <button onclick="goto(q2no)">Нет</button>
    </div>
    <div class="container" id="q2no" style="display: none;">
        <img src="q2no.jpg">
        <button onclick="goto(q1)">Ще раз</button>
    </div>

    <div class="container" id="q3" style="display: none;">
        <h1>Затащил?</h1>
        <button onclick="goto(q3no)">Ес</button>
        <button onclick="gotoFoundGame()">Ноу</button>
    </div>
    <div class="container" id="q3no" style="display: none;">
        <img src="q3no.jpg">
        <button onclick="goto(q1)">Ще раз</button>
    </div>

    <div class="container" id="foundGame" style="display: none;">
        <div class="title">
            <h2>Ваша игра готова</h2>
            <h1>Лудка</h1>
        </div>
        <button onclick="gotoGame()">Принять</button>
    </div>

    <div class="container" id="game" style="display: none;">
        <h1>ЛУДКА</h1>

        <div class="slots" id="slotContainer"></div>

        <button id="spinBtn">SPIN</button>
        <p class="result-display" id="resultDisplay">Press SPIN</p>

        <div class="status-panel" id="statusContainer"></div>
    </div>

    <div class="container" id="winScreen" style="display: none;">
        <img src="win.jpg">
    </div>

    <div class="loading">
        <img src="dotalogo.jpg">
        <button style="display: none;" onclick="start()">Начать</button>
    </div>

    <img class="preload" src="mazevis.png" id="bgImage">
    <img class="preload" src="mazecol.png" id="wallMapImage">
    <img class="preload" src="charicon.png" id="charImage">
</body>

</html>
