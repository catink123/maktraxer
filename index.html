<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>дока 3</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="container" id="q1" style="display: none;">
        <h1>Любишь сеню?</h1>
        <button onclick="goto(q2)">Дат</button>
        <button onclick="goto(q1no)">Нит</button>
    </div>
    <div class="container" id="q1no" style="display: none;">
        <img src="q1no.jpg">
        <button onclick="goto(q1)">Ще раз</button>
    </div>

    <div class="container" id="q2" style="display: none;">
        <h1>Согласен?</h1>
        <button onclick="goto(q3)">Да</button>
        <button onclick="goto(q2no)">Нет</button>
    </div>
    <div class="container" id="q2no" style="display: none;">
        <img src="q2no.jpg">
        <button onclick="goto(q1)">Ще раз</button>
    </div>

    <div class="container" id="q3" style="display: none;">
        <h1>Затащил?</h1>
        <button onclick="goto(q3no)">Ес</button>
        <button onclick="goto(game)">Ноу</button>
    </div>
    <div class="container" id="q3no" style="display: none;">
        <img src="q3no.jpg">
        <button onclick="goto(q1)">Ще раз</button>
    </div>

    <div class="container" id="game" style="display: none;">
        <canvas width="500" height="500"></canvas>
        <div class="controls">
            <button class="control-button" onmousedown="startMoveUp()" onmouseup="stopMoveUp()" ontouchstart="startMoveUp()" ontouchend="stopMoveUp()">Up</button>
            <button class="control-button" onmousedown="startMoveDown()" onmouseup="stopMoveDown()" ontouchstart="startMoveDown()" ontouchend="stopMoveDown()">Down</button>
            <button class="control-button" onmousedown="startMoveLeft()" onmouseup="stopMoveLeft()" ontouchstart="startMoveLeft()" ontouchend="stopMoveLeft()">Left</button>
            <button class="control-button" onmousedown="startMoveRight()" onmouseup="stopMoveRight()" ontouchstart="startMoveRight()" ontouchend="stopMoveRight()">Right</button>
        </div>
    </div>

    <img class="loading" src="dotalogo.jpg">

    <img class="preload" src="mazevis.png" id="bgImage">
    <img class="preload" src="mazecol.png" id="wallMapImage">
    <img class="preload" src="charicon.png" id="charImage">
</body>
</html>
